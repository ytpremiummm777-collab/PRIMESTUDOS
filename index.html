<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plataforma P★ - Aprovação Pro</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/FF0000/p.png"> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary-red: #ff3b30;
            --bg-deep: #0a0a0c;
            --card-glass: rgba(28, 28, 30, 0.8);
            --text-gold: #f5f5f7;
            --accent-blue: #007aff;
            --success-green: #34c759;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #0a0a0c 100%);
            color: var(--text-gold);
            margin: 0;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* Header Sophisticated */
        header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .logo-star {
            position: absolute;
            top: -15px;
            right: -5px;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .logo-p {
            font-size: 60px;
            font-weight: 900;
            color: var(--primary-red);
            line-height: 1;
        }

        /* Container & Navigation */
        .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }

        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sophisticated Cards */
        .card-selection {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card-selection:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }

        /* Questões UI */
        .question-box {
            background: var(--card-glass);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .banca-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
            font-weight: 700;
        }

        .btn-option {
            width: 100%;
            padding: 18px;
            margin-top: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-weight: 600;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
        }

        /* Comentário e Gabarito */
        .feedback {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
        }

        .correct { background: rgba(52, 199, 89, 0.2); border: 1px solid var(--success-green); }
        .wrong { background: rgba(255, 59, 48, 0.2); border: 1px solid var(--primary-red); }

        /* Floating Pomodoro */
        .pomodoro-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.95);
            padding: 12px 30px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .timer-text { font-family: 'SF Mono', monospace; font-size: 20px; font-weight: bold; }

    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <span class="logo-star">★</span>
        <span class="logo-p">P</span>
    </div>
    <div id="welcome-text" style="font-size: 12px; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">Elite de Estudos</div>
</header>

<div class="container">

    <div id="page-cargos" class="page active">
        <h2 style="font-weight: 700; margin-bottom: 30px;">Qual sua meta?</h2>
        <div class="card-selection" onclick="loadMaterias('Magistratura / Jurídica')">
            <h3 style="margin:0">Carreira Jurídica</h3>
            <p style="margin:5px 0 0; opacity:0.5; font-size:14px">Juiz, Promotor, Defensor</p>
        </div>
        <div class="card-selection" onclick="loadMaterias('Segurança Pública')">
            <h3 style="margin:0">Segurança Pública</h3>
            <p style="margin:5px 0 0; opacity:0.5; font-size:14px">Delegado, Agente, Perito</p>
        </div>
        <div class="card-selection" onclick="loadMaterias('Gestão e Fiscal')">
            <h3 style="margin:0">Gestão e Fiscal</h3>
            <p style="margin:5px 0 0; opacity:0.5; font-size:14px">Auditor, Analista, Receita</p>
        </div>
    </div>

    <div id="page-materias" class="page">
        <div id="cargo-title" style="margin-bottom: 25px; color: var(--accent-blue); font-weight: bold;"></div>
        <div id="lista-materias"></div>
        <button onclick="showPage('page-cargos')" style="background:none; border:none; color:white; opacity:0.5; margin-top:20px; cursor:pointer">← Voltar para áreas</button>
    </div>

    <div id="page-questoes" class="page">
        <div class="question-box">
            <div id="meta-info" class="banca-badge">CARREGANDO...</div>
            <p id="enunciado" style="font-size: 18px; font-weight: 500; margin: 20px 0;"></p>
            
            <button class="btn-option" onclick="checkAnswer(true)">Certo</button>
            <button class="btn-option" onclick="checkAnswer(false)">Errado</button>

            <div id="feedback-area" class="feedback">
                <strong id="result-label"></strong>
                <p id="comentario-text" style="margin-top: 10px;"></p>
                <button class="btn-option" onclick="nextQuestion()" style="background: var(--accent-blue); text-align: center; border:none; margin-top:15px">Próxima Questão</button>
            </div>
        </div>
    </div>

</div>

<div class="pomodoro-dock">
    <div class="timer-text" id="clock">25:00</div>
    <button id="playBtn" onclick="toggleClock()" style="background: var(--primary-red); border:none; color:white; padding:8px 15px; border-radius:20px; font-weight:bold; cursor:pointer">FOCO</button>
</div>

<script>
    let stats = { acertos: 0, erros: 0 };
    let currentSubject = "";
    let qIndex = 0;

    const db = {
        "Magistratura / Jurídica": ["Constitucional", "Penal", "Processo Civil"],
        "Segurança Pública": ["Penal", "Português", "Informática", "Leis Especiais"],
        "Gestão e Fiscal": ["Contabilidade", "Administrativo", "Tributário"]
    };

    const questoes = {
        "Penal": [
            {
                banca: "FGV",
                texto: "A legítima defesa putativa exclui a culpabilidade se o erro for invencível?",
                resp: true,
                comentario: "Exatamente! Segundo o Art. 20, §1º do CP, se o erro nas discriminantes putativas é plenamente justificado pelas circunstâncias (invencível), exclui-se tanto o dolo quanto a culpa, isentando de pena."
            },
            {
                banca: "CEBRASPE",
                texto: "O peculato culposo admite a extinção da punibilidade se o dano for reparado antes da sentença irrecorrível?",
                resp: true,
                comentario: "Correto. No peculato culposo, a reparação do dano que precede a sentença irrecorrível extingue a punibilidade. Se for posterior, reduz a pena pela metade."
            }
        ],
        "Constitucional": [
            {
                banca: "FCC",
                texto: "É competência privativa da União legislar sobre Direito Civil e Comercial?",
                resp: true,
                comentario: "Art. 22, I da CF/88. Compete privativamente à União legislar sobre direito civil, comercial, penal, processual, eleitoral, agrário, marítimo, aeronáutico, espacial e do trabalho."
            }
        ]
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function loadMaterias(area) {
        document.getElementById('cargo-title').innerText = area;
        const list = document.getElementById('lista-materias');
        list.innerHTML = "";
        db[area].forEach(m => {
            list.innerHTML += `<div class="card-selection" onclick="startQuestions('${m}')"><h3>${m}</h3></div>`;
        });
        showPage('page-materias');
    }

    function startQuestions(materia) {
        currentSubject = materia;
        qIndex = 0;
        nextQuestion();
        showPage('page-questoes');
    }

    function nextQuestion() {
        const qset = questoes[currentSubject] || [{banca: "SISTEMA", texto: "Parabéns! Você revisou este tópico. Vamos para a próxima?", resp: true, comentario: "O importante é a constância!"}];
        const q = qset[qIndex % qset.length];
        
        document.getElementById('meta-info').innerText = `BANCA ${q.banca} • ${currentSubject}`;
        document.getElementById('enunciado').innerText = q.texto;
        document.getElementById('feedback-area').style.display = "none";
        document.getElementById('comentario-text').innerText = q.comentario;
        qIndex++;
    }

    function checkAnswer(userChoice) {
        const qset = questoes[currentSubject] || [ {resp: true} ];
        const correct = qset[(qIndex-1) % qset.length].resp;
        const feedback = document.getElementById('feedback-area');
        const label = document.getElementById('result-label');

        feedback.style.display = "block";
        if(userChoice === correct) {
            label.innerText = "✓ EXCELENTE!";
            feedback.className = "feedback correct";
        } else {
            label.innerText = "✕ FOQUE NO ERRO";
            feedback.className = "feedback wrong";
        }
    }

    // Timer Logic
    let timer;
    let tLeft = 25 * 60;
    let tRunning = false;

    function toggleClock() {
        const btn = document.getElementById('playBtn');
        if(tRunning) {
            clearInterval(timer);
            btn.innerText = "FOCO";
        } else {
            timer = setInterval(() => {
                tLeft--;
                let m = Math.floor(tLeft / 60);
                let s = tLeft % 60;
                document.getElementById('clock').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(tLeft <= 0) clearInterval(timer);
            }, 1000);
            btn.innerText = "PAUSAR";
        }
        tRunning = !tRunning;
    }

</script>
</body>
</html>
